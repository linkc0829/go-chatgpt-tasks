openapi: 3.1.0
info:
  title: chatgpt-tasks API
  version: 0.1.0
  description: |
    Hexagonal-architecture Go backend template. Endpoints follow REST conventions
    and require Bearer JWT auth except for /auth/register and /auth/login.

servers:
  - url: http://localhost:8080
    description: Local dev

security:
  - bearerAuth: []

tags:
  - name: auth
  - name: users
  - name: jobs

paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: OK

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/users/me:
    get:
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/jobs:
    post:
      tags: [jobs]
      summary: Create a scheduled job
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateJobRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    get:
      tags: [jobs]
      summary: List scheduled job runs
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListRunsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/jobs/{id}:
    get:
      tags: [jobs]
      summary: Get a scheduled job run
      parameters:
        - $ref: "#/components/parameters/IDPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/jobs/{id}/runs:
    get:
      tags: [jobs]
      summary: List runs for a scheduled job
      parameters:
        - $ref: "#/components/parameters/IDPath"
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100 }
        - name: offset
          in: query
          schema: { type: integer, minimum: 0 }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListRunsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/jobs/{id}/cancel:
    post:
      tags: [jobs]
      summary: Cancel a scheduled job run
      parameters:
        - $ref: "#/components/parameters/IDPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/RunResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/v1/runs/{id}/events:
    get:
      tags: [jobs]
      summary: List lifecycle events for a job run
      parameters:
        - $ref: "#/components/parameters/IDPath"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ListEventsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IDPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
    Unauthorized:
      description: Unauthorized
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
    Conflict:
      description: Conflict
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
    NotFound:
      description: Not Found
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email:        { type: string, format: email }
        password:     { type: string, minLength: 8, maxLength: 72 }
        display_name: { type: string, minLength: 1, maxLength: 64 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    UserResponse:
      type: object
      properties:
        id:           { type: string, format: uuid }
        email:        { type: string }
        display_name: { type: string }
        created_at:   { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        user:  { $ref: "#/components/schemas/UserResponse" }
        token: { type: string }

    CreateJobRequest:
      type: object
      required: [description]
      properties:
        description: { type: string, minLength: 1 }
        scheduled_at: { type: string, format: date-time }
        recurring_interval_seconds: { type: integer, minimum: 1 }
        schedule_type: { type: string, enum: [one_off, recurring] }
        recurrence_rule: { type: string, example: "FREQ=DAILY" }
        local_time: { type: string, example: "08:00" }
        timezone_id: { type: string, example: "Asia/Taipei" }
        original_user_text: { type: string }

    RunResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        job_id: { type: string, format: uuid }
        status: { type: string }
        scheduled_at: { type: string, format: date-time }
        sequence: { type: integer }
        attempts: { type: integer }
        error_code: { type: string }
        error_message: { type: string }
        started_at: { type: string, format: date-time }
        completed_at: { type: string, format: date-time }
        failed_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        schedule_type: { type: string }
        recurrence_rule: { type: string }
        local_time: { type: string }
        timezone_id: { type: string }
        next_run_at_utc: { type: string, format: date-time }

    ListRunsResponse:
      type: object
      properties:
        runs:
          type: array
          items: { $ref: "#/components/schemas/RunResponse" }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }

    RunEventResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string, format: uuid }
        job_id: { type: string, format: uuid }
        job_run_id: { type: string, format: uuid }
        status: { type: string }
        event_type: { type: string }
        payload: { type: object }
        created_at: { type: string, format: date-time }

    ListEventsResponse:
      type: object
      properties:
        events:
          type: array
          items: { $ref: "#/components/schemas/RunEventResponse" }
