openapi: 3.1.0
info:
  title: chatgpt-tasks API
  version: 0.1.0
  description: |
    Hexagonal-architecture Go backend template. Endpoints follow REST conventions
    and require Bearer JWT auth except for /auth/register and /auth/login.

servers:
  - url: http://localhost:8080
    description: Local dev

security:
  - bearerAuth: []

tags:
  - name: auth
  - name: users

paths:
  /healthz:
    get:
      tags: [system]
      summary: Liveness probe
      security: []
      responses:
        "200":
          description: OK

  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/users/me:
    get:
      tags: [users]
      summary: Get current user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IDPath:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
    Unauthorized:
      description: Unauthorized
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
    Conflict:
      description: Conflict
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
    NotFound:
      description: Not Found
      content:
        application/json: { schema: { $ref: "#/components/schemas/Error" } }
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error: { type: string }

    RegisterRequest:
      type: object
      required: [email, password, display_name]
      properties:
        email:        { type: string, format: email }
        password:     { type: string, minLength: 8, maxLength: 72 }
        display_name: { type: string, minLength: 1, maxLength: 64 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:    { type: string, format: email }
        password: { type: string }

    UserResponse:
      type: object
      properties:
        id:           { type: string, format: uuid }
        email:        { type: string }
        display_name: { type: string }
        created_at:   { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        user:  { $ref: "#/components/schemas/UserResponse" }
        token: { type: string }
